<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pan-African Credit Registry — Maintenance</title>
  <meta name="description" content="We are working hard updating the site. Please check back shortly." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1a;
      color: #e2e8f0;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(20, 120, 110, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56, 130, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(200, 160, 50, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 520px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #0d9488, #1e6b8a);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(13, 148, 136, 0.25);
      animation: float 3s ease-in-out infinite;
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
      margin: 0 auto 2rem;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #0d9488, #38bdf8);
      border-radius: 3px;
      animation: progress 2s ease-in-out infinite;
    }

    @keyframes progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(13, 148, 136, 0.08);
      border: 1px solid rgba(13, 148, 136, 0.2);
      border-radius: 100px;
      font-size: 0.8rem;
      color: #5eead4;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14b8a6;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: rgba(148, 163, 184, 0.4);
    }

    .retry-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #5eead4;
      text-decoration: none;
      padding: 8px 20px;
      border: 1px solid rgba(94, 234, 212, 0.2);
      border-radius: 8px;
      transition: all 0.2s;
    }
    .retry-link:hover {
      background: rgba(94, 234, 212, 0.08);
      border-color: rgba(94, 234, 212, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085" />
      </svg>
    </div>
    <h1>We're Updating Things</h1>
    <p class="subtitle">
      We are working hard to improve your experience. The platform will be back shortly with new features and improvements.
    </p>
    <div class="progress-bar"></div>
    <div class="status">
      <span class="status-dot"></span>
      Maintenance in progress
    </div>
    <br />
    <a href="/" class="retry-link" onclick="location.reload(); return false;">Try Again</a>
    <div class="footer">
      Pan-African Credit Registry &mdash; Carlson Capital &amp; Systems In Motion Limited
    </div>
  </div>
  <script>
    setTimeout(function check() {
      fetch('/api/health', { method: 'GET' })
        .then(function(r) {
          if (r.ok) location.reload();
          else setTimeout(check, 10000);
        })
        .catch(function() { setTimeout(check, 10000); });
    }, 15000);
  </script>
</body>
</html>
