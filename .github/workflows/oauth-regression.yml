name: OAuth Login Regression Tests

on:
  push:
  pull_request:

jobs:
  oauth-regression:
    name: OAuth & SAML regression (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret
      SEED_ADMIN_PASSWORD: admin0987
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push database schema
        run: npm run db:push

      - name: Run OAuth login regression tests
        run: npx vitest run server/__tests__/oauth-flows.test.ts server/__tests__/saml-login.test.ts server/__tests__/cross-product-gateway.test.ts

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [oauth-regression]
    if: failure()

    steps:
      - name: Send Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *CI failure — OAuth Login Regression Tests*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI failure — OAuth Login Regression Tests*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run on GitHub>"
                  }
                }
              ]
            }

      - name: Send email alert (Slack not configured)
        if: ${{ secrets.SLACK_WEBHOOK_URL == '' && secrets.ALERT_EMAIL_TO != '' && secrets.SMTP_SERVER != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI failure — OAuth Login Regression Tests (${{ github.repository }})"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
          body: |
            CI failure — OAuth Login Regression Tests

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
