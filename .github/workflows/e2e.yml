name: E2E Regression Suite — UCH Production Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Nightly run at 03:00 UTC to catch regressions before the working day
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Shared DB/env defaults used by all jobs
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: testdb
  DB_HOST: localhost
  DB_PORT: 5432

# ─────────────────────────────────────────────────────────────────────────────
# Reusable app-server environment block (avoids copy/paste across jobs)
# ─────────────────────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Unauthenticated specs — public pages, redirect guards
  # ──────────────────────────────────────────────────────────────────────────
  e2e-unauthenticated:
    name: "E2E / Unauthenticated (Chromium)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-e2e
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret-e2e
      SEED_ADMIN_PASSWORD: admin0987
      OWNER_ADMIN_PASSWORD: owner0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5001
      ENABLE_E2E_TEST_AUTH: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: pw-ver
        run: echo "version=$(node -p \"require('./package.json').devDependencies['@playwright/test']\")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run db:push
      - run: npx playwright test --project=unauthenticated
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-unauthenticated
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 2a. Authenticated specs — Chromium
  # ──────────────────────────────────────────────────────────────────────────
  e2e-authenticated-chromium:
    name: "E2E / Authenticated (Chromium)"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-e2e
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret-e2e
      SEED_ADMIN_PASSWORD: admin0987
      OWNER_ADMIN_PASSWORD: owner0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5001
      ENABLE_E2E_TEST_AUTH: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: pw-ver
        run: echo "version=$(node -p \"require('./package.json').devDependencies['@playwright/test']\")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run db:push
      - run: npx playwright test --project=authenticated-chromium
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-authenticated-chromium
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 2b. Authenticated specs — Firefox (cross-browser coverage)
  # ──────────────────────────────────────────────────────────────────────────
  e2e-authenticated-firefox:
    name: "E2E / Authenticated (Firefox)"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-e2e
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret-e2e
      SEED_ADMIN_PASSWORD: admin0987
      OWNER_ADMIN_PASSWORD: owner0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5001
      ENABLE_E2E_TEST_AUTH: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: pw-ver
        run: echo "version=$(node -p \"require('./package.json').devDependencies['@playwright/test']\")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps firefox
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps firefox
      - run: npm run db:push
      - run: npx playwright test --project=authenticated-firefox
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-authenticated-firefox
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 3. OAuth smoke tests (Google + Microsoft + SAML)
  # ──────────────────────────────────────────────────────────────────────────
  e2e-oauth-smoke:
    name: "E2E / OAuth Smoke Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-e2e
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret-e2e
      SEED_ADMIN_PASSWORD: admin0987
      OWNER_ADMIN_PASSWORD: owner0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5001
      ENABLE_E2E_TEST_AUTH: "true"
      GOOGLE_CLIENT_ID: mock-google-ci-client-id
      GOOGLE_CLIENT_SECRET: mock-google-ci-secret
      MICROSOFT_CLIENT_ID: mock-ms-ci-client-id
      MICROSOFT_CLIENT_SECRET: mock-ms-ci-secret
      MICROSOFT_TENANT_ID: common
      CANONICAL_URL: https://universalcredithub.com
      SAML_IDP_ENTRY_POINT: https://mock-idp.example.com/sso/saml

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: pw-ver
        run: echo "version=$(node -p \"require('./package.json').devDependencies['@playwright/test']\")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run db:push
      - run: npx playwright test --project=oauth-smoke
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-oauth-smoke
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Loto admin dashboard specs (existing spec)
  # ──────────────────────────────────────────────────────────────────────────
  e2e-loto-admin:
    name: "E2E / Loto Admin Dashboard"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-e2e
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret-e2e
      SEED_ADMIN_PASSWORD: admin0987
      OWNER_ADMIN_PASSWORD: owner0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5001
      ENABLE_E2E_TEST_AUTH: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - id: pw-ver
        run: echo "version=$(node -p \"require('./package.json').devDependencies['@playwright/test']\")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npm run db:push
      - run: npx playwright test --project=chromium
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-loto-admin
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Summary gate — all jobs must pass to green the PR/push
  # ──────────────────────────────────────────────────────────────────────────
  e2e-all-pass:
    name: "E2E / All Specs Passed"
    runs-on: ubuntu-latest
    needs:
      - e2e-unauthenticated
      - e2e-authenticated-chromium
      - e2e-authenticated-firefox
      - e2e-oauth-smoke
      - e2e-loto-admin
    if: always()

    steps:
      - name: Check all E2E jobs passed
        run: |
          echo "unauthenticated:         ${{ needs.e2e-unauthenticated.result }}"
          echo "authenticated-chromium:  ${{ needs.e2e-authenticated-chromium.result }}"
          echo "authenticated-firefox:   ${{ needs.e2e-authenticated-firefox.result }}"
          echo "oauth-smoke:             ${{ needs.e2e-oauth-smoke.result }}"
          echo "loto-admin:              ${{ needs.e2e-loto-admin.result }}"
          results=(
            "${{ needs.e2e-unauthenticated.result }}"
            "${{ needs.e2e-authenticated-chromium.result }}"
            "${{ needs.e2e-authenticated-firefox.result }}"
            "${{ needs.e2e-oauth-smoke.result }}"
            "${{ needs.e2e-loto-admin.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "One or more E2E jobs failed or were skipped."
              exit 1
            fi
          done
          echo "All E2E jobs passed."

      - name: Notify on failure (Slack)
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *E2E Regression Suite failed — UCH*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":x: *E2E Regression Suite failed*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Actor:* ${{ github.actor }}\n*Failed jobs:* unauth=${{ needs.e2e-unauthenticated.result }}, chromium=${{ needs.e2e-authenticated-chromium.result }}, firefox=${{ needs.e2e-authenticated-firefox.result }}, oauth=${{ needs.e2e-oauth-smoke.result }}, loto=${{ needs.e2e-loto-admin.result }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }
