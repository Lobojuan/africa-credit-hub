name: Playwright Full Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  playwright-unauthenticated:
    name: Unauthenticated specs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-change-me-in-prod
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret
      SEED_ADMIN_PASSWORD: admin0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Push database schema
        run: npm run db:push

      - name: Start application server
        run: |
          npm run dev &
          echo $! > /tmp/server.pid

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 5000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:5000 > /dev/null 2>&1; then
              echo "Server is ready after ${i} attempts"
              break
            fi
            echo "Attempt ${i}/30 — server not yet ready, waiting 3s..."
            sleep 3
          done

      - name: Run unauthenticated Playwright specs
        run: npx playwright test --project=unauthenticated

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-unauthenticated
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

  playwright-authenticated:
    name: Authenticated specs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-change-me-in-prod
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret
      SEED_ADMIN_PASSWORD: admin0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Push database schema
        run: npm run db:push

      - name: Start application server
        run: |
          npm run dev &
          echo $! > /tmp/server.pid

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 5000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:5000 > /dev/null 2>&1; then
              echo "Server is ready after ${i} attempts"
              break
            fi
            echo "Attempt ${i}/30 — server not yet ready, waiting 3s..."
            sleep 3
          done

      - name: Run authenticated Playwright specs
        run: npx playwright test --project=authenticated

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [playwright-unauthenticated, playwright-authenticated]
    if: failure()

    steps:
      - name: Send Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *CI failure — Playwright Full Test Suite*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI failure — Playwright Full Test Suite*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* ${{ github.actor }}\n*Failed jobs:* unauthenticated=${{ needs.playwright-unauthenticated.result }}, authenticated=${{ needs.playwright-authenticated.result }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run on GitHub>"
                  }
                }
              ]
            }

      - name: Send email alert (Slack not configured)
        if: ${{ secrets.SLACK_WEBHOOK_URL == '' && secrets.ALERT_EMAIL_TO != '' && secrets.SMTP_SERVER != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI failure — Playwright Full Test Suite (${{ github.repository }})"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
          body: |
            CI failure — Playwright Full Test Suite

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Failed jobs:
              - unauthenticated: ${{ needs.playwright-unauthenticated.result }}
              - authenticated:   ${{ needs.playwright-authenticated.result }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
