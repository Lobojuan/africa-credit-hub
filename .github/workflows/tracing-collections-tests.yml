name: Tracing & Collections Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  playwright:
    name: Run tracing-collections Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
      SESSION_SECRET: ci-session-secret-change-me-in-prod
      PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY || 'Y2ktcGlpLWVuY3J5cHRpb24ta2V5LWZvci10ZXN0aW5n' }}
      PII_ENCRYPTION_SALT: ${{ secrets.PII_ENCRYPTION_SALT || 'Y2ktcGlpLXNhbHQtZm9yLXRlc3Rpbmctb25seQ==' }}
      EXTERNAL_API_JWT_SECRET: ci-jwt-secret
      SEED_ADMIN_PASSWORD: admin0987
      RUN_SEED: "true"
      NODE_ENV: development
      PORT: 5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Push database schema
        run: npm run db:push

      - name: Start application server
        run: |
          npm run dev &
          echo $! > /tmp/server.pid

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 5000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1 || \
               curl -sf http://localhost:5000 > /dev/null 2>&1; then
              echo "Server is ready after ${i} attempts"
              break
            fi
            echo "Attempt ${i}/30 — server not yet ready, waiting 3s..."
            sleep 3
          done

      - name: Run tracing-collections Playwright tests
        run: npx playwright test e2e/tracing-collections.spec.ts --project=authenticated

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/report/
            e2e/test-results-artifacts/
          retention-days: 14

      - name: Build Slack failure payload
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_RUN_NUMBER: ${{ github.run_number }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_ACTOR: ${{ github.actor }}
          GH_COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title || 'no message' }}
        run: |
          FAILED_TESTS=$(node -e "
            let failed = '_No results file found — see the full report artifact._';
            try {
              const r = require('./e2e/results.json');
              const names = [];
              function walk(suites) {
                (suites || []).forEach(s => {
                  (s.specs || []).forEach(sp => {
                    const hasFail = (sp.tests || []).some(t =>
                      (t.results || []).some(r2 => r2.status === 'failed' || r2.status === 'timedOut')
                    );
                    if (hasFail) names.push(sp.title);
                  });
                  walk(s.suites);
                });
              }
              walk(r.suites);
              if (names.length === 0) {
                failed = '_No individual test names available — see the full report artifact._';
              } else {
                const lines = names.slice(0, 10).map((t, i) => (i + 1) + '. ' + t);
                if (names.length > 10) lines.push('… and ' + (names.length - 10) + ' more');
                failed = lines.join('\n');
              }
            } catch (e) {
              failed = '_Could not parse test results — see the full report artifact._';
            }
            console.log(failed);
          " 2>/dev/null || echo '_Could not parse test results — see the full report artifact._')

          PAYLOAD=$(FAILED_TESTS="$FAILED_TESTS" node -e "
            const payload = {
              text: ':red_circle: CI test suite failed on main',
              blocks: [
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: ':red_circle: *Tracing & Collections tests failed on \`main\`*\n\n' +
                      '*Workflow:* ' + process.env.GH_WORKFLOW + '\n' +
                      '*Run:* <' + process.env.GH_RUN_URL + '|View failed run #' + process.env.GH_RUN_NUMBER + '>\n' +
                      '*Triggered by:* \`' + process.env.GH_ACTOR + '\` — ' + process.env.GH_COMMIT_MSG
                  }
                },
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*Failed tests:*\n' + (process.env.FAILED_TESTS || '_No test names available._')
                  }
                }
              ]
            };
            console.log(JSON.stringify(payload));
          " 2>/dev/null)

          echo "SLACK_PAYLOAD<<EOF" >> "$GITHUB_ENV"
          echo "$PAYLOAD" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ env.SLACK_PAYLOAD }}

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi
